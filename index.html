<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> A Beautiful Calculator</title>
    <link rel="stylesheet" href="style.css" >
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div>
            <input  placeholder="0" id="inputBox" readonly>
        </div>
      <div class="buttons">
        
            <button class="operator size">AC</button>
            <button class="operator " data-action ="delete"><i class="fa-solid fa-delete-left"></i></button>
            <button class="operator">%</button>
            <button class="operator">/</button>
        
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>
        
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>
        
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
        
            <button>00</button>
            <button>0</button>
            <button >.</button>
            <button class="operator equalBtn">=</button>
        
        
      </div> 

    </div>

     <script src="script.js"></script>
</body>

</html>
